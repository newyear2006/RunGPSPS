name: Generate RunGPS Stats

on:
  workflow_dispatch:
  #push:
  #  paths:
  #    - "RunGPSData/Trainings/**/*.tcx"
  #    - "RunGPSData/Trainings/**/*.TCX"
  #    - "scripts/generate_rungps_stats.py"
  #    - "requirements-stats.txt"
  #    - ".github/workflows/RunGPSStats.yml"

permissions:
  contents: write

concurrency:
  group: rungps-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-stats.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-stats.txt

      - name: Generate RunGPS statistics
        run: |
          python scripts/generate_rungps_stats.py

      - name: Commit generated stats
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add RunGPSData/Stats/

          if git diff --cached --quiet; then
            echo "No stats changes to commit."
            exit 0
          fi

          git commit -m "Update RunGPS stats"
          git push
